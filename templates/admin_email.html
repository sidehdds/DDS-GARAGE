<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DDS GARAGE — Envoi Email</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #050810;
      --surface: #090d16;
      --surface2: #0d1320;
      --border: #182035;
      --accent: #e63946;
      --text: #dde8f5;
      --muted: #4d6080;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 32px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); margin-bottom: 8px; }
    .nav { display: flex; gap: 16px; margin-bottom: 32px; }
    .nav a { color: var(--muted); text-decoration: none; font-size: 13px; }
    .nav a:hover { color: var(--text); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; max-width: 700px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; margin-top: 20px; }
    label:first-of-type { margin-top: 0; }
    input, textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 14px; outline: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 200px; resize: vertical; }
    .btn {
      margin-top: 24px; padding: 12px 28px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .result { margin-top: 20px; padding: 14px 18px; border-radius: 8px; font-size: 14px; display: none; }
    .result.success { background: #0d2b1a; border: 1px solid #1a5c35; color: #4ade80; }
    .result.error { background: #2b0d0d; border: 1px solid #5c1a1a; color: #f87171; }
    .preview-toggle { color: var(--accent); font-size: 12px; cursor: pointer; margin-top: 8px; display: inline-block; }
    #preview { margin-top: 12px; border: 1px solid var(--border); border-radius: 8px; padding: 16px; background: #fff; color: #000; display: none; min-height: 100px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/admin">← Admin Chat</a>
    <a href="/admin/logout">Déconnexion</a>
  </div>
  <h1>Envoi Email</h1>
  <p style="color:var(--muted);font-size:13px;margin-bottom:24px">Envoie un email à tous tes abonnés actifs.</p>

  <div class="card">
    <label>Sujet</label>
    <input type="text" id="subject" placeholder="Ex: Nouvelle fonctionnalité DDS Garage 🚗"/>

    <label>Contenu HTML</label>
    <textarea id="html" placeholder="<p>Bonjour,</p><p>...</p>"></textarea>
    <span class="preview-toggle" onclick="togglePreview()">Aperçu →</span>
    <div id="preview"></div>

    <button class="btn" id="sendBtn" onclick="sendEmail()">Envoyer à tous les abonnés</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    function togglePreview() {
      const p = document.getElementById('preview');
      const html = document.getElementById('html').value;
      if (p.style.display === 'block') {
        p.style.display = 'none';
      } else {
        p.innerHTML = html;
        p.style.display = 'block';
      }
    }

    async function sendEmail() {
      const subject = document.getElementById('subject').value.trim();
      const html = document.getElementById('html').value.trim();
      const btn = document.getElementById('sendBtn');
      const result = document.getElementById('result');

      if (!subject || !html) {
        result.className = 'result error';
        result.textContent = 'Sujet et contenu requis.';
        result.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Envoi en cours...';
      result.style.display = 'none';

      try {
        const res = await fetch('/api/admin/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subject, html })
        });
        const data = await res.json();
        if (res.ok) {
          result.className = 'result success';
          result.textContent = `✓ ${data.sent} email(s) envoyé(s) sur ${data.total} abonnés.${data.errors ? ` (${data.errors} erreur(s))` : ''}`;
        } else {
          result.className = 'result error';
          result.textContent = data.error || 'Erreur lors de l\'envoi.';
        }
      } catch (e) {
        result.className = 'result error';
        result.textContent = 'Erreur réseau.';
      }

      result.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Envoyer à tous les abonnés';
    }
  </script>
</body>
</html>
