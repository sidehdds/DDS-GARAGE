<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DDS GARAGE — Abonnement activé</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .success-box {
      background: var(--surface); border: 1px solid rgba(0,240,255,.2);
      border-radius: 20px; padding: 48px 40px; max-width: 440px; width:100%;
      text-align:center; box-shadow: 0 0 60px rgba(0,240,255,.08);
    }
    .success-icon { font-size: 52px; margin-bottom: 20px; }
    .success-title { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:3px; color:#fff; margin-bottom:8px; }
    .success-sub { font-size:14px; color:var(--muted); line-height:1.7; margin-bottom:28px; }
    .success-token {
      background: var(--surface2); border:1px solid rgba(0,240,255,.15);
      border-radius:10px; padding:14px 16px; margin-bottom:24px;
      font-size:11px; color:var(--muted);
    }
    .success-token code { display:block; color:var(--accent2); font-size:12px; margin-top:6px; word-break:break-all; letter-spacing:.5px; }
    .success-btn {
      display:inline-block; background:var(--accent2); color:#050810;
      font-weight:700; font-family:'Inter',sans-serif; font-size:14px;
      padding:13px 28px; border-radius:10px; text-decoration:none;
      box-shadow:0 0 20px rgba(0,240,255,.35);
    }
  </style>
</head>
<body>
  <div class="success-box">
    <div class="success-icon">✅</div>
    <div class="success-title">Abonnement activé !</div>
    <p class="success-sub">
      Merci pour ton abonnement DDS Garage Premium.<br/>
      Tu as maintenant accès à des diagnostics IA illimités.
    </p>
    {% if token %}
    <div class="success-token">
      Ton token d'accès (sauvegardé automatiquement) :
      <code>{{ token }}</code>
    </div>
    {% endif %}
    <a href="/diagnostic" class="success-btn" onclick="saveToken()">Accéder aux diagnostics →</a>
  </div>
  <script>
    function saveToken() {
      {% if token %}
      localStorage.setItem('premium_token', '{{ token }}');
      localStorage.setItem('premium_email', '{{ email }}');
      {% endif %}
    }
    // Auto-save on load
    {% if token %}
    localStorage.setItem('premium_token', '{{ token }}');
    localStorage.setItem('premium_email', '{{ email }}');
    {% endif %}
  </script>
</body>
</html>
